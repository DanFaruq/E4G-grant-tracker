name: Daily Deadline Reminders

on:
  schedule:
    # 07:00 UTC every day
    - cron: "0 7 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

jobs:
  reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger reminders cron
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/reminders")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Reminders cron failed with status $STATUS"
            exit 1
          fi
          echo "Reminders cron completed successfully"
