name: Daily Discovery & AI Scoring

on:
  schedule:
    # 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger discovery cron
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/discover")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Discovery cron failed with status $STATUS"
            exit 1
          fi
          echo "Discovery cron completed successfully"
